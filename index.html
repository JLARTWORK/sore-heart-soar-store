<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#002266">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Sore Heart Soar | Official Merch Store</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ms-blue: #003399;
      --ms-blue-dark: #002266;
      --ms-blue-light: #6699cc;
      --ms-blue-pale: #d6e4f0;
      --ms-blue-panel: #b8d4e8;
      --ms-orange: #ff9933;
      --ms-orange-dark: #cc6600;
      --ms-link: #003399;
      --ms-link-hover: #cc0000;
      --ms-bg: #e5e5e5;
      --ms-white: #ffffff;
      --ms-border: #999999;
      --ms-text: #000000;
      --ms-muted: #666666;
      --ms-green: #339900;
      --ms-red: #cc0000;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: Verdana, Arial, Helvetica, sans-serif;
      font-size: 11px;
      background: var(--ms-bg);
      color: var(--ms-text);
      line-height: 1.4;
    }

    a { color: var(--ms-link); text-decoration: underline; cursor: pointer; }
    a:hover { color: var(--ms-link-hover); }

    .ms-topbar {
      background: var(--ms-blue-dark);
      color: #fff;
      font-size: 10px;
      padding: 3px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

</html>
